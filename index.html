<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR内覧</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
    #panorama { width: 100vw; height: 100vh; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
      padding: 16px;
      pointer-events: none;
    }
    #property-name { color: #fff; font-size: 15px; font-weight: bold; }
    #current-room { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }

    #room-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 20px 16px 24px;
      display: flex; gap: 8px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #room-nav::-webkit-scrollbar { display: none; }

    .room-btn {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .room-btn.active {
      background: #0066cc;
      border-color: #0066cc;
    }

    #loading {
      position: fixed; inset: 0;
      background: #111;
      color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 200;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      position: fixed; inset: 0;
      background: #111; color: #fff;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; text-align: center; padding: 24px;
    }
    #error .icon { font-size: 48px; }
    #error p { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;">読み込み中...</div>
</div>

<div id="error">
  <div class="icon">🏠</div>
  <div style="font-size:18px; font-weight:bold;">物件が見つかりません</div>
  <p>URLをご確認ください</p>
</div>

<div id="header">
  <div id="property-name"></div>
  <div id="current-room"></div>
</div>

<div id="panorama"></div>
<div id="room-nav"></div>

<script>
  const params = new URLSearchParams(location.search);
  const tourId = params.get('tour');

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
  }

  if (!tourId) {
    showError();
  } else {
    fetch(`tours/${tourId}.json`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.title = data.name + ' | VR内覧';
        document.getElementById('property-name').textContent = data.name;

        const scenes = {};
        data.rooms.forEach(room => {
          scenes[room.id] = {
            title: room.name,
            type: 'equirectangular',
            panorama: room.photo,
            hotSpots: (room.hotspots || []).map(hs => ({
              pitch: hs.pitch || 0,
              yaw: hs.yaw || 0,
              type: 'scene',
              text: hs.text,
              sceneId: hs.targetRoom,
              cssClass: 'custom-hotspot'
            }))
          };
        });

        const viewer = pannellum.viewer('panorama', {
          default: {
            firstScene: data.rooms[0].id,
            sceneFadeDuration: 800,
            autoLoad: true,
            showControls: true,
            keyboardZoom: false,
            hfov: 100,
            minHfov: 50,
            maxHfov: 120
          },
          scenes
        });

        const nav = document.getElementById('room-nav');
        const buttons = [];

        data.rooms.forEach((room, i) => {
          const btn = document.createElement('button');
          btn.className = 'room-btn' + (i === 0 ? ' active' : '');
          btn.textContent = room.name;
          btn.onclick = () => {
            viewer.loadScene(room.id);
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          };
          nav.appendChild(btn);
          buttons.push(btn);
        });

        document.getElementById('current-room').textContent = data.rooms[0].name;

        viewer.on('scenechange', sceneId => {
          const idx = data.rooms.findIndex(r => r.id === sceneId);
          if (idx >= 0) {
            buttons.forEach(b => b.classList.remove('active'));
            buttons[idx].classList.add('active');
            document.getElementById('current-room').textContent = data.rooms[idx].name;
          }
        });
      })
      .catch(showError);
  }
</script>
</body>
</html>
